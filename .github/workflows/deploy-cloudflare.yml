name: Deploy zu Cloudflare Pages

# Optionaler Token-basierter Deploy. EINFACHER ist die Git-Integration im
# Cloudflare-Dashboard (siehe DEPLOY.md, Variante A, ohne Secrets).
# Diese Variante braucht Repo-Secrets CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID.

on:
  workflow_dispatch:
  # push:           # nach dem Einrichten der Secrets aktivieren:
  #   branches: [main]

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=historische-schuhe --branch=main
